<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the silent rooms — still, the noise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#000; }
body { cursor:none; }
body { cursor:none; font-family:'Courier New',monospace; user-select:none; }
#stage {
  position:relative; width:100vw; min-height:100vh;
  overflow:hidden; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap: 48px;
  padding: 220px 0 80px;
  box-sizing: border-box;
}
canvas#bg { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }

#header {
  position:relative; z-index:10;
  text-align:center; pointer-events:none;
}
#header-title {
  font-family:'Cormorant SC',serif;
  font-size:clamp(24px,4vw,38px);
  letter-spacing:0.14em; text-transform:lowercase;
  color:rgba(255,255,255,0.75);
}
#header-sub {
  font-family:'Montserrat',sans-serif; font-weight:300;
  font-size:clamp(10px,1.4vw,13px);
  letter-spacing:0.28em; text-transform:lowercase;
  color:rgba(255,255,255,0.35); margin-top:10px;
}

#rooms-grid {
  position:relative; z-index:2;
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
  width: min(680px, 90vw);
}

@media (max-width: 500px) {
  #rooms-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
}

.room {
  aspect-ratio: 0.55;
  position:relative;
  border: 0.5px solid rgba(255,255,255,0.18);
  overflow:hidden;
  cursor:default;
  transition: border-color 0.4s ease;
}

.room.open {
  border-color: rgba(255,255,255,0.55);
  box-shadow: 0 0 12px rgba(255,255,255,0.07), 0 0 28px rgba(255,255,255,0.03);
  cursor:pointer;
}

.room:not(.open):active {
  border-color: rgba(255,255,255,0.35);
}

.room canvas {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  display:block;
}

.room-num {
  position:absolute; bottom:6px; right:7px;
  font-family:'Courier New',monospace;
  font-size:8px; letter-spacing:0.08em;
  color:rgba(255,255,255,0.18);
  pointer-events:none; line-height:1;
  transition: color 0.4s;
}
.room.open .room-num { color:rgba(255,255,255,0.45); }

.room-label {
  position:absolute; bottom:6px; left:0; right:0;
  text-align:center;
  font-family:'Courier New',monospace;
  font-size:7px; letter-spacing:0.12em;
  text-transform:lowercase;
  color:rgba(255,255,255,0);
  pointer-events:none;
  transition: color 0.5s ease;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  padding:0 4px;
}
.room.open:hover .room-label { color:rgba(255,255,255,0.6); }
.room.open:hover .room-num   { color:rgba(255,255,255,0); }



#cursor {
  position:fixed; pointer-events:none; z-index:9999;
  width:4px; height:4px; border-radius:50%;
  background:rgba(255,255,255,0.9);
  transform:translate(-50%,-50%);
  transition:none;
}

  /* back link - top left */
  .back-link {
    position:fixed; top:20px; left:20px;
    font-family:'Montserrat',sans-serif; font-weight:300;
    font-size:10px; letter-spacing:0.22em; text-transform:uppercase;
    color:#888; text-decoration:none;
    transition:color 0.25s; z-index:999;
    display:flex; align-items:center; gap:8px;
  }
  .back-link::before { content:'←'; font-size:12px; }
  .back-link:hover { color:#f0ede8; }

  /* site header - centred, absolute over stage */
  .site-header {
    position:absolute; top:0; left:0; right:0;
    z-index:20; display:flex; flex-direction:column;
    align-items:center; padding:44px 0 0;
    pointer-events:none;
  }
  .site-header a { pointer-events:all; display:block; line-height:0; text-decoration:none; }
  .site-header img { height:48px; width:auto; opacity:0.9; display:block; }
  .site-artist {
    font-family:'Montserrat',sans-serif; font-weight:300;
    font-size:12px; letter-spacing:0.28em; text-transform:uppercase;
    color:rgba(255,255,255,0.6); margin-top:14px; pointer-events:none;
  }
  .site-album {
    font-family:'Cormorant SC',serif; font-weight:300;
    font-size:clamp(18px,2.8vw,28px); letter-spacing:0.06em;
    color:rgba(255,255,255,0.8); margin-top:8px; pointer-events:none;
  }

  /* release section below stage */
  .release-section {
    width:100%; max-width:600px; margin:0 auto;
    text-align:center; padding:40px 28px;
    background:#000; border:1px solid #111;
  }
  .release-eyebrow {
    font-family:'Montserrat',sans-serif; font-weight:300;
    font-size:10px; letter-spacing:0.3em; text-transform:uppercase;
    color:#555; margin-bottom:16px;
  }
  .release-headline {
    font-family:'Cormorant SC',serif; font-weight:300;
    font-size:clamp(28px,5vw,44px); letter-spacing:0.06em;
    color:rgba(255,255,255,0.85);
  }
  .release-sub {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-weight:300; font-size:clamp(14px,2vw,17px);
    color:#666; margin-top:10px;
  }
  .streaming-label {
    font-family:'Montserrat',sans-serif; font-weight:300;
    font-size:10px; letter-spacing:0.3em; text-transform:uppercase;
    color:#555; margin:28px 0 16px;
  }
  .streaming-links { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .stream-btn {
    font-family:'Montserrat',sans-serif; font-weight:300;
    font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    color:#7a7a7a; text-decoration:none; padding:9px 14px;
    border:1px solid #222; transition:all 0.25s; white-space:nowrap;
  }
  .stream-btn:hover { color:#f0ede8; border-color:#888; }

  footer {
    margin:48px 0 32px; text-align:center; background:#000;
    padding-bottom:20px;
  }
  .ig-link {
    font-family:'Montserrat',sans-serif; font-weight:300;
    font-size:11px; letter-spacing:0.28em; text-transform:uppercase;
    color:#555; text-decoration:none; transition:color 0.25s;
  }
  .ig-link:hover { color:#f0ede8; }
  .footer-copy {
    font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:12px; color:#2e2e2e; margin-top:12px;
  }

</style>
</head>

<script>
const ROOMS = [
  { id:1,  open:false },
  { id:2,  open:false },
  { id:3,  open:false },
  { id:4,  open:true,  label:"didn't say so", href:"didnt-say-so.html" },
  { id:5,  open:false },
  { id:6,  open:false },
  { id:7,  open:false },
  { id:8,  open:false },
  { id:9,  open:false },
  { id:10, open:false },
  { id:11, open:false },
];

const grid = document.getElementById('rooms-grid');
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
const cursorEl = document.getElementById('cursor');

let W, H;
function resize() {
  W = bgCanvas.width = window.innerWidth;
  H = bgCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// build rooms
ROOMS.forEach(room => {
  const div = document.createElement('div');
  div.className = 'room' + (room.open ? ' open' : '');

  const cv = document.createElement('canvas');
  div.appendChild(cv);

  const num = document.createElement('div');
  num.className = 'room-num';
  num.textContent = String(room.id).padStart(2,'0');
  div.appendChild(num);

  if (room.label) {
    const lbl = document.createElement('div');
    lbl.className = 'room-label';
    lbl.textContent = room.label;
    div.appendChild(lbl);
  }

  if (room.open) {
    div.addEventListener('click', () => { window.location.href = room.href; });
  } else {
    div.addEventListener('click', () => {
      div.style.borderColor = 'rgba(255,255,255,0.3)';
      setTimeout(() => { div.style.borderColor = ''; }, 300);
    });
  }

  grid.appendChild(div);
  initDebris(cv, room.open);
});

function initDebris(canvas, isOpen) {
  const ctx = canvas.getContext('2d');
  const COUNT = isOpen ? 5 : 2;
  let dots = [];
  let W, H;

  function resize() {
    W = canvas.width = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }

  function spawnDot() {
    const angle = Math.random() * Math.PI * 2;
    const spd = 0.06 + Math.random() * 0.2;
    return {
      x: W*0.1 + Math.random()*W*0.8,
      y: H*0.1 + Math.random()*H*0.8,
      vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: 0.55 + Math.random()*0.45,
      decay: 0.0022 + Math.random()*0.003,
      size: Math.random() < 0.65 ? 1 : 1.5,
      fp: Math.random()*Math.PI*2,
      fs: 5 + Math.random()*12,
      fa: isOpen ? 0.28+Math.random()*0.35 : 0.12+Math.random()*0.18,
      trail: [],
      pb: isOpen ? 1.0+Math.random()*0.4 : 0.28+Math.random()*0.2,
    };
  }

  function loop(ts) {
    requestAnimationFrame(loop);
    if (!W || !H) { resize(); return; }
    ctx.clearRect(0,0,W,H);
    if (dots.length < COUNT && Math.random() < 0.025) dots.push(spawnDot());
    const tsec = ts*0.001;
    for (let i=dots.length-1; i>=0; i--) {
      const p = dots[i];
      p.trail.push({x:p.x,y:p.y});
      if (p.trail.length > 5) p.trail.shift();
      p.x+=p.vx; p.y+=p.vy;
      p.life-=p.decay;
      if (p.life<=0||p.x<-2||p.x>W+2||p.y<-2||p.y>H+2) { dots.splice(i,1); continue; }
      const f1=Math.sin(tsec*p.fs+p.fp);
      const f2=Math.sin(tsec*p.fs*1.7+p.fp*0.6);
      const fv=((f1+f2)*0.5)*0.5+0.5;
      const dr=Math.max(0,(0.55-p.life)/0.55);
      const flicker=Math.max(0,1-p.fa*(1+dr*2.2)*(1-fv));
      for (let t=0;t<p.trail.length;t++) {
        const frac=(t+1)/p.trail.length;
        const ta=frac*p.life*0.45*p.pb;
        if(ta<0.02)continue;
        ctx.fillStyle=`rgba(255,255,255,${Math.min(1,ta).toFixed(3)})`;
        ctx.fillRect(p.trail[t].x,p.trail[t].y,p.size,p.size);
      }
      const ca=Math.min(1,p.life*1.7*p.pb)*flicker;
      if(ca>0.02){
        ctx.fillStyle=`rgba(255,255,255,${ca.toFixed(3)})`;
        ctx.fillRect(p.x,p.y,p.size,p.size);
      }
    }
  }

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { resize(); for(let k=0;k<COUNT;k++) dots.push(spawnDot()); requestAnimationFrame(loop); obs.disconnect(); }
    });
  }, {threshold:0.1});
  obs.observe(canvas.parentElement);
  window.addEventListener('resize', () => { resize(); });
}

// background breath
let breathPhase = 0;
function bgLoop() {
  requestAnimationFrame(bgLoop);
  bgCtx.clearRect(0,0,W,H);
  breathPhase += 0.0006;
  const bv = (Math.sin(breathPhase)*0.5+0.5)*0.012;
  if(bv>0.001){ bgCtx.fillStyle=`rgba(255,255,255,${bv.toFixed(4)})`; bgCtx.fillRect(0,0,W,H); }
}
requestAnimationFrame(bgLoop);

// flickering light cursor
(function(){
  let phase = Math.random()*Math.PI*2;
  document.addEventListener('mousemove', e => {
    cursorEl.style.left = e.clientX+'px';
    cursorEl.style.top  = e.clientY+'px';
  });
  function flicker(){
    phase += 0.08 + Math.random()*0.04;
    const f1=Math.sin(phase*1.3), f2=Math.sin(phase*2.1+0.7);
    const v=((f1+f2)*0.5)*0.5+0.5;
    const s=(3+v*2).toFixed(1), b=(4+v*8).toFixed(1);
    cursorEl.style.opacity=(0.55+v*0.45).toFixed(3);
    cursorEl.style.width=s+'px'; cursorEl.style.height=s+'px';
    cursorEl.style.boxShadow=`0 0 ${b}px ${(+b/3).toFixed(1)}px rgba(255,255,255,${(v*0.5).toFixed(3)}),0 0 ${(+b*2).toFixed(1)}px ${b}px rgba(255,255,255,${(v*0.2).toFixed(3)})`;
    requestAnimationFrame(flicker);
  }
  requestAnimationFrame(flicker);
})();
</script>
