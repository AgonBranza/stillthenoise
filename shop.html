<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>make it real — still, the noise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #080808; --text: #f0ede8; --dim: rgba(240,237,232,0.4); --border: #1a1a1a; }
  body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 24px 80px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5; }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 720px; }
  .logo-mark { display: block; height: 48px; width: auto; margin: 0 auto 28px; opacity: 0.85; }
  h1 { font-family: 'Cormorant SC', serif; font-weight: 300; font-size: clamp(28px, 6vw, 48px); text-align: center; letter-spacing: 0.04em; margin-bottom: 12px; }
  .sub { text-align: center; font-size: 11px; letter-spacing: 0.18em; text-transform: lowercase; color: var(--dim); margin-bottom: 48px; }

  /* Mockup preview */
  .mockup-wrap { text-align: center; margin-bottom: 32px; min-height: 320px; display: flex; align-items: center; justify-content: center; }
  .mockup-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); margin-bottom: 16px; }
  #mockupCanvas { max-width: 480px; max-height: 480px; cursor: zoom-in; display: none; }
  .mockup-placeholder { font-size: 11px; letter-spacing: 0.12em; color: var(--dim); text-align: center; }

  /* Design preview (shown when no mockup available) */
  .preview-wrap { border: 1px solid var(--border); padding: 24px; margin-bottom: 32px; text-align: center; display: none; }
  .preview-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); margin-bottom: 16px; }
  #previewImg { max-width: 240px; max-height: 240px; display: block; margin: 0 auto; border: 1px solid #111; }

  .grid-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); margin-bottom: 20px; text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-bottom: 32px; }
  .product-card { border: 1px solid var(--border); padding: 18px 14px; cursor: pointer; transition: border-color 0.3s, background 0.3s; text-align: center; color: var(--text); }
  .product-card:hover { border-color: rgba(90,130,240,0.6); background: rgba(60,100,210,0.05); }
  .product-card.selected { border-color: rgba(90,130,240,0.9); background: rgba(60,100,210,0.08); }
  .product-name { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; font-weight: 300; margin-bottom: 6px; }
  .product-sub { font-size: 9px; letter-spacing: 0.15em; text-transform: lowercase; color: var(--dim); }

  .size-wrap { display: none; margin-bottom: 32px; text-align: center; border: 1px solid var(--border); padding: 20px; }
  .size-wrap.visible { display: block; }
  .size-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); margin-bottom: 14px; }
  .size-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .size-btn { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 10px; letter-spacing: 0.15em; padding: 8px 14px; background: none; cursor: pointer; border: 1px solid #333; color: var(--dim); transition: all 0.2s; }
  .size-btn:hover { border-color: rgba(90,130,240,0.6); color: var(--text); }
  .size-btn.selected { border-color: rgba(90,130,240,0.9); color: rgba(110,150,255,0.95); background: rgba(60,100,210,0.08); }

  .cta-wrap { text-align: center; }
  #ctaBtn { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; padding: 16px 40px; background: none; cursor: pointer; transition: all 0.3s ease; border: 1px solid rgba(60,100,210,0.75); color: rgba(90,130,240,0.8); animation: mercglow 2.8s ease-in-out infinite; display: inline-block; text-decoration: none; opacity: 0.35; pointer-events: none; }
  #ctaBtn.active { opacity: 1; pointer-events: all; }
  @keyframes mercglow {
    0%, 100% { box-shadow: 0 0 5px rgba(60,100,210,0.3), 0 0 10px rgba(60,100,210,0.1); border-color: rgba(60,100,210,0.75); color: rgba(90,130,240,0.8); }
    50%       { box-shadow: 0 0 10px rgba(80,130,255,0.55), 0 0 20px rgba(60,100,210,0.2); border-color: rgba(90,140,255,0.95); color: rgba(110,150,255,0.95); }
  }
  .cta-note { font-size: 9px; letter-spacing: 0.15em; color: var(--dim); margin-top: 16px; text-transform: lowercase; }
  .no-design-note { font-size: 10px; letter-spacing: 0.12em; color: var(--dim); margin-bottom: 32px; text-align: center; padding: 20px; border: 1px solid var(--border); display: none; }
  .back { display: block; text-align: center; margin-top: 40px; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); text-decoration: none; transition: color 0.3s; }
  .back:hover { color: var(--text); }

  /* Lightbox */
  #lightbox {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.92); z-index: 9999;
    align-items: center; justify-content: center; cursor: zoom-out;
  }
  #lightbox.visible { display: flex; }
  #lightboxCanvas { max-width: 88vw; max-height: 88vh; display: block; }
  #lightboxClose {
    position: fixed; top: 20px; right: 28px; font-family: 'Montserrat', sans-serif;
    font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(255,255,255,0.55); cursor: pointer; z-index: 10000;
    padding: 8px;
  }
  #lightboxClose:hover { color: rgba(255,255,255,0.95); }
  .zoom-hint {
    font-size: 9px; letter-spacing: 0.15em; color: var(--dim);
    text-align: center; margin-top: 8px; text-transform: lowercase; display: none;
  }
  .zoom-hint.visible { display: block; }
</style>
</head>

  img.src = m.b64;
  m.img = img;
});

const stored = sessionStorage.getItem('stn_print_design');
const cloudURL = sessionStorage.getItem('stn_cloud_url') || '';
const hasCloud = cloudURL.length > 0;
const hasDesign = stored && stored.length > 0;

if (!hasDesign) {
  document.getElementById('noDesignNote').style.display = 'block';
}

// Load design image for compositing
const designImg = new Image();
if (hasDesign) designImg.src = stored;

let selectedProduct = null;
let selectedVariantId = null;

function renderMockup(product) {
  const mockupKey = product.mockup;
  const canvas = document.getElementById('mockupCanvas');
  const placeholder = document.getElementById('mockupPlaceholder');
  const previewWrap = document.getElementById('previewWrap');

  if (mockupKey && MOCKUPS[mockupKey] && hasDesign) {
    const m = MOCKUPS[mockupKey];
    const SIZE = 600;
    canvas.width = SIZE;
    canvas.height = SIZE;
    canvas.style.display = 'block'; document.getElementById('zoomHint').classList.add('visible');
    placeholder.style.display = 'none';
    previewWrap.style.display = 'none';

    const ctx = canvas.getContext('2d');

    function draw() {
      ctx.clearRect(0, 0, SIZE, SIZE);
      // Draw mockup
      ctx.drawImage(m.img, 0, 0, SIZE, SIZE);
      // Draw design into print area
      const px = m.px * SIZE;
      const py = m.py * SIZE;
      const pw = m.pw * SIZE;
      const ph = m.ph * SIZE;
      ctx.save();
      ctx.globalAlpha = 0.92;
      ctx.drawImage(designImg, px, py, pw, ph);
      ctx.restore();
    }

    if (m.img.complete) draw();
    else m.img.onload = draw;
    if (designImg.complete) draw();
    else designImg.onload = draw;

  } else if (hasDesign) {
    // No mockup for this product — show plain design preview
    canvas.style.display = 'none';
    placeholder.style.display = 'none';
    previewWrap.style.display = 'block';
    document.getElementById('previewImg').src = stored;
  } else {
    canvas.style.display = 'none';
    placeholder.style.display = 'block';
    previewWrap.style.display = 'none';
    placeholder.textContent = 'select a product to continue';
  }
}

function updateCTA() {
  const btn = document.getElementById('ctaBtn');
  const note = document.getElementById('ctaNote');
  if (!selectedProduct) return;
  const needsSize = selectedProduct.variants[0].size !== null;
  if (needsSize && !selectedVariantId) {
    btn.classList.remove('active');
    note.textContent = 'choose a size to continue';
    return;
  }
  const variantId = selectedVariantId || selectedProduct.variants[0].id;
  if (hasCloud) {
    btn.href = 'https://agon-branza.myshopify.com/cart/' + variantId + ':1?attributes[personalized_file]=' + encodeURIComponent(cloudURL);
    note.textContent = 'your design is attached — goes straight to checkout';
  } else {
    btn.href = selectedProduct.url;
    note.textContent = 'opens product page — upload your design manually';
  }
  btn.classList.add('active');
}

const grid = document.getElementById('productGrid');
PRODUCTS.forEach((p) => {
  const card = document.createElement('div');
  card.className = 'product-card';
  card.innerHTML = `<div class="product-name">${p.name}</div><div class="product-sub">${p.sub}</div>`;
  card.addEventListener('click', () => {
    document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedProduct = p;
    selectedVariantId = null;
    renderMockup(p);
    const sizeWrap = document.getElementById('sizeWrap');
    const sizeBtns = document.getElementById('sizeBtns');
    sizeBtns.innerHTML = '';
    const needsSize = p.variants[0].size !== null;
    if (needsSize) {
      sizeWrap.classList.add('visible');
      p.variants.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'size-btn';
        btn.textContent = v.size;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedVariantId = v.id;
          updateCTA();
        });
        sizeBtns.appendChild(btn);
      });
    } else {
      sizeWrap.classList.remove('visible');
    }
    updateCTA();
  });
  grid.appendChild(card);
});

// Lightbox
document.getElementById('mockupCanvas').addEventListener('click', function() {
  if (this.style.display === 'none') return;
  const lb = document.getElementById('lightbox');
  const lbc = document.getElementById('lightboxCanvas');
  // Render at full 1200px for lightbox
  const LSIZE = 1200;
  lbc.width = LSIZE; lbc.height = LSIZE;
  const lctx = lbc.getContext('2d');
  if (selectedProduct && selectedProduct.mockup && MOCKUPS[selectedProduct.mockup]) {
    const m = MOCKUPS[selectedProduct.mockup];
    lctx.drawImage(m.img, 0, 0, LSIZE, LSIZE);
    lctx.globalAlpha = 0.92;
    lctx.drawImage(designImg, m.px*LSIZE, m.py*LSIZE, m.pw*LSIZE, m.ph*LSIZE);
  }
  lb.classList.add('visible');
});

document.getElementById('lightbox').addEventListener('click', function() {
  this.classList.remove('visible');
});
document.getElementById('lightboxClose').addEventListener('click', function(e) {
  e.stopPropagation();
  document.getElementById('lightbox').classList.remove('visible');
});

</script>
</body>
</html>
