<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>make it real — still, the noise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #080808; --text: #f0ede8; --dim: rgba(240,237,232,0.4); --border: #1a1a1a; --blue: rgba(90,130,240,0.85); --blue-border: rgba(60,100,210,0.75); }
  body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 24px 120px; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.5; }
  .wrap { position: relative; z-index: 1; width: 100%; max-width: 760px; }
  .logo-mark { display: block; height: 44px; width: auto; margin: 0 auto 24px; opacity: 0.8; }
  h1 { font-family: 'Cormorant SC', serif; font-weight: 300; font-size: clamp(26px, 5vw, 44px); text-align: center; letter-spacing: 0.04em; margin-bottom: 10px; }
  .tagline { text-align: center; font-size: 10px; letter-spacing: 0.2em; text-transform: lowercase; color: var(--dim); margin-bottom: 48px; }
  .design-wrap { text-align: center; margin-bottom: 48px; }
  .design-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); margin-bottom: 16px; }
  #designPreview { max-width: min(280px, 75vw); max-height: min(280px, 75vw); display: block; margin: 0 auto; border: 1px solid #111; }
  .no-design { font-size: 11px; letter-spacing: 0.12em; color: var(--dim); padding: 60px 0; text-align: center; border: 1px solid var(--border); }
  .grid-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); margin-bottom: 20px; text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1px; border: 1px solid var(--border); margin-bottom: 48px; background: var(--bg); }
  .product-card:last-child { grid-column: auto; }
  .product-card { background: var(--bg); padding: 24px 20px; cursor: pointer; transition: background 0.25s; display: flex; flex-direction: column; gap: 6px; }
  .product-card:hover { background: #0f0f0f; }
  .product-card.selected { background: rgba(60,100,210,0.07); }
  .product-name { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px; font-weight: 300; }
  .product-price { font-size: 10px; letter-spacing: 0.15em; color: var(--dim); }
  .product-loading { font-style: italic; }

  /* Panel */
  .panel-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; backdrop-filter: blur(6px); }
  .panel-backdrop.visible { display: block; }
  .panel { position: fixed; bottom: 0; left: 0; right: 0; background: #080808; border-top: 1px solid #1e1e1e; z-index: 101; padding: 0; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .panel.visible { transform: translateY(0); }
  .panel-close { position: sticky; top: 0; display: flex; justify-content: flex-end; padding: 16px 24px; background: #080808; border-bottom: 1px solid #111; z-index: 10; }
  .panel-close-btn { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); cursor: pointer; padding: 4px 8px; transition: color 0.2s; }
  .panel-close-btn:hover { color: var(--text); }
  .panel-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  @media (max-width: 600px) { .panel-body { grid-template-columns: 1fr; } }

  /* Mockup side */
  .panel-mockup-wrap { position: relative; background: #111; display: flex; align-items: center; justify-content: center; min-height: 300px; padding: 24px; }
  .panel-mockup-wrap::after { content: ''; position: absolute; inset: 0; box-shadow: inset 0 0 40px rgba(0,0,0,0.6); pointer-events: none; z-index: 1; }
  #panelCanvas { max-width: 100%; max-height: 420px; display: block; cursor: zoom-in; }
  .panel-zoom-hint { position: absolute; bottom: 12px; left: 0; right: 0; text-align: center; font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.2); }

  /* Info side */
  .panel-info { padding: 32px 28px; display: flex; flex-direction: column; gap: 20px; border-left: 1px solid var(--border); }
  .panel-name { font-family: 'Cormorant SC', serif; font-weight: 300; font-size: clamp(20px, 3.5vw, 30px); letter-spacing: 0.03em; }
  .panel-price { font-size: 11px; letter-spacing: 0.15em; color: var(--dim); }
  .panel-desc { font-size: 11px; line-height: 2.0; color: rgba(240,237,232,0.65); letter-spacing: 0.04em; font-style: italic; }
  .panel-divider { border: none; border-top: 1px solid var(--border); }

  /* Details accordion */
  .details-toggle { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 4px 0; transition: color 0.2s; user-select: none; }
  .details-toggle:hover { color: var(--text); }
  .details-toggle .arrow { transition: transform 0.3s; font-size: 10px; }
  .details-toggle.open .arrow { transform: rotate(180deg); }
  .details-content { display: none; font-size: 10px; line-height: 2.0; color: rgba(240,237,232,0.5); letter-spacing: 0.04em; margin-top: 12px; }
  .details-content.open { display: block; }
  .details-content table { width: 100%; border-collapse: collapse; }
  .details-content td { padding: 3px 8px 3px 0; vertical-align: top; }
  .details-content td:first-child { color: rgba(240,237,232,0.35); white-space: nowrap; padding-right: 16px; }

  /* Size */
  .size-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
  .size-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .size-btn { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 10px; letter-spacing: 0.12em; padding: 7px 12px; background: none; cursor: pointer; border: 1px solid #222; color: var(--dim); transition: all 0.2s; }
  .size-btn:hover { border-color: rgba(90,130,240,0.5); color: var(--text); }
  .size-btn.selected { border-color: rgba(90,130,240,0.9); color: rgba(110,150,255,0.95); background: rgba(60,100,210,0.08); }

  /* Order button */
  .order-btn { font-family: 'Montserrat', sans-serif; font-weight: 300; font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; padding: 15px 28px; background: none; cursor: pointer; border: 1px solid var(--blue-border); color: var(--blue); width: 100%; animation: mercglow 2.8s ease-in-out infinite; text-decoration: none; display: block; text-align: center; opacity: 0.35; pointer-events: none; }
  .order-btn.active { opacity: 1; pointer-events: all; }
  @keyframes mercglow { 0%, 100% { box-shadow: 0 0 5px rgba(60,100,210,0.3), 0 0 10px rgba(60,100,210,0.1); border-color: rgba(60,100,210,0.75); color: rgba(90,130,240,0.8); } 50% { box-shadow: 0 0 10px rgba(80,130,255,0.55), 0 0 20px rgba(60,100,210,0.2); border-color: rgba(90,140,255,0.95); color: rgba(110,150,255,0.95); } }
  .order-note { font-size: 9px; letter-spacing: 0.12em; color: var(--dim); text-align: center; margin-top: 10px; }

  /* Lightbox */
  #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; cursor: zoom-out; }
  #lightbox.visible { display: flex; }
  #lightboxCanvas { max-width: 90vw; max-height: 90vh; display: block; }
  #lightboxClose { position: fixed; top: 20px; right: 28px; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.5); cursor: pointer; padding: 8px; }
  #lightboxClose:hover { color: rgba(255,255,255,0.9); }

  .sleeve-section { display: none; margin-top: 16px; }
  .sleeve-section.visible { display: block; }
  .sleeve-section-label { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); text-align: center; margin-bottom: 8px; }
  .sleeve-thumbs { display: flex; gap: 8px; justify-content: center; }
  .sleeve-thumb { width: 110px; height: 110px; object-fit: cover; display: block; cursor: zoom-in; opacity: 0.9; transition: opacity 0.2s; }
  .sleeve-thumb:hover { opacity: 1; }

  .back { display: block; text-align: center; margin-top: 40px; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--dim); text-decoration: none; transition: color 0.3s; }
  .back:hover { color: var(--text); }
</style>
</head>

// Preload all mockup images
Object.keys(MOCKUPS).forEach(k => {
  const m = MOCKUPS[k];
  m.img = new Image();
  m.img.src = m.src;
});

// Design image
const designImg = new Image();
if (stored) {
  designImg.src = stored;
  document.getElementById('designPreview').src = stored;
  document.getElementById('designPreview').style.display = 'block';
  document.getElementById('noDesign').style.display = 'none';
}

const productCache = {};
async function fetchProduct(handle) {
  if (productCache[handle]) return productCache[handle];
  try {
    const res = await fetch(`${STORE}/products/${handle}.json`);
    const data = await res.json();
    productCache[handle] = data.product;
    return data.product;
  } catch(e) { return null; }
}

function formatPrice(price, currency) {
  return new Intl.NumberFormat('en-GB', { style: 'currency', currency: currency || 'GBP' }).format(price);
}

function renderMockup(canvas, productDef, size) {
  const S = size || 500;
  canvas.width = S; canvas.height = S;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, S, S);

  const mockupKey = productDef.mockup;
  if (!mockupKey || !MOCKUPS[mockupKey]) {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, S, S);
    if (stored && designImg.complete && designImg.naturalWidth > 0) {
      const sq = S * 0.8;
      ctx.drawImage(designImg, (S-sq)/2, (S-sq)/2, sq, sq);
    }
    return;
  }

  const m = MOCKUPS[mockupKey];
  // Print area in canvas pixels
  const px = productDef.px * S;
  const py = productDef.py * S;
  const pw = productDef.pw * S;
  const ph = productDef.ph * S;
  const isHoodie = mockupKey === 'hoodie';

  // Always draw design as a SQUARE, centred within the print area
  const sqSize = Math.min(pw, ph);
  const sqX = px + (pw - sqSize) / 2;
  const sqY = py + (ph - sqSize) / 2;

  function draw() {
    ctx.clearRect(0, 0, S, S);
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, S, S);

    if (isHoodie) {
      // 1. Draw opaque hoodie as base
      ctx.drawImage(m.img, 0, 0, S, S);
      // 2. Draw user design on chest
      if (stored && designImg.complete && designImg.naturalWidth > 0) {
        ctx.drawImage(designImg, sqX, sqY, sqSize, sqSize);
      }
      // 3. Draw strings-only layer on top (transparent PNG, only bright pixels kept)
      if (MOCKUPS.hoodie_strings && MOCKUPS.hoodie_strings.img && MOCKUPS.hoodie_strings.img.complete && MOCKUPS.hoodie_strings.img.naturalWidth > 0) {
        ctx.drawImage(MOCKUPS.hoodie_strings.img, 0, 0, S, S);
      }
    } else {
      // Mockup first, then design on top as square
      ctx.drawImage(m.img, 0, 0, S, S);
      if (stored && designImg.complete && designImg.naturalWidth > 0) {
        ctx.drawImage(designImg, sqX, sqY, sqSize, sqSize);
      }

    }
  }

  const mockupReady = m.img.complete && m.img.naturalWidth > 0;
  const designReady = !stored || (designImg.complete && designImg.naturalWidth > 0);

  if (mockupReady && designReady) {
    draw();
  } else {
    if (!mockupReady) m.img.onload = () => { if (!stored || designImg.complete) draw(); };
    if (stored && !designReady) designImg.onload = () => { if (m.img.complete) draw(); };
    setTimeout(draw, 500);
  }
}

// Lightbox
document.getElementById('panelCanvas').addEventListener('click', function() {
  const lb = document.getElementById('lightbox');
  const lbc = document.getElementById('lightboxCanvas');
  if (currentProduct) renderMockup(lbc, currentProduct, 1200);
  lb.classList.add('visible');
});
document.getElementById('lightbox').addEventListener('click', () => document.getElementById('lightbox').classList.remove('visible'));

function openLightboxImg(src) {
  const lbc = document.getElementById('lightboxCanvas');
  const img = new Image();
  img.onload = () => {
    lbc.width = img.naturalWidth;
    lbc.height = img.naturalHeight;
    const ctx = lbc.getContext('2d');
    ctx.drawImage(img, 0, 0);
  };
  img.src = src;
  document.getElementById('lightbox').classList.add('visible');
}
document.getElementById('lightboxClose').addEventListener('click', e => { e.stopPropagation(); document.getElementById('lightbox').classList.remove('visible'); });

// Details accordion
document.getElementById('detailsToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('detailsContent').classList.toggle('open');
});

let selectedProduct = null;
let selectedVariantId = null;
let currentProduct = null;

function updateOrderBtn() {
  const btn = document.getElementById('orderBtn');
  const note = document.getElementById('orderNote');
  if (!selectedProduct) return;
  const needsSize = selectedProduct.variants[0].size !== null;
  if (needsSize && !selectedVariantId) {
    btn.classList.remove('active');
    note.textContent = 'choose a size to continue';
    return;
  }
  const variantId = selectedVariantId || selectedProduct.variants[0].id;
  if (hasCloud) {
    btn.href = `${STORE}/cart/${variantId}:1?attributes[personalized_file]=${encodeURIComponent(cloudURL)}`;
    note.textContent = 'your design is attached';
  } else {
    btn.href = `${STORE}/products/${selectedProduct.handle}`;
    note.textContent = 'opens product page';
  }
  btn.classList.add('active');
}

function parseDetailsHTML(bodyHtml) {
  const tmp = document.createElement('div');
  tmp.innerHTML = bodyHtml;
  // Get everything after the first em (poetic line)
  let html = tmp.innerHTML;
  // Remove first italic paragraph
  const firstEm = tmp.querySelector('em');
  if (firstEm) firstEm.closest('p') && firstEm.closest('p').remove();
  return tmp.innerHTML;
}

async function openPanel(productDef) {
  selectedProduct = productDef;
  currentProduct = productDef;
  selectedVariantId = null;

  document.getElementById('panelName').textContent = productDef.name;
  document.getElementById('panelPrice').textContent = '';
  document.getElementById('panelDesc').textContent = '';
  document.getElementById('detailsContent').innerHTML = '';
  document.getElementById('detailsContent').classList.remove('open');
  document.getElementById('detailsToggle').classList.remove('open');
  document.getElementById('sizeBtns').innerHTML = '';
  document.getElementById('sizeSection').style.display = 'none';
  document.getElementById('orderBtn').classList.remove('active');
  document.getElementById('orderNote').textContent = '—';

  // Render mockup immediately
  renderMockup(document.getElementById('panelCanvas'), productDef, 500);

  // Show sleeve details for t-shirt
  const sleeveSection = document.getElementById('sleeveSection');
  if (productDef.mockup === 'tshirt') {
    document.getElementById('sleeveLeft').src = TSHIRT_SLEEVE_LEFT;
    document.getElementById('sleeveRight').src = TSHIRT_SLEEVE_RIGHT;
    sleeveSection.classList.add('visible');
  } else {
    sleeveSection.classList.remove('visible');
  }
  const hoodieBackSection = document.getElementById('hoodieBackSection');
  if (productDef.mockup === 'hoodie') {
    document.getElementById('hoodieBack').src = HOODIE_BACK;
    hoodieBackSection.classList.add('visible');
  } else {
    hoodieBackSection.classList.remove('visible');
  }

  // Show panel
  document.getElementById('backdrop').classList.add('visible');
  document.getElementById('panel').classList.add('visible');
  document.body.style.overflow = 'hidden';

  // Fetch product data
  const product = await fetchProduct(productDef.handle);
  if (product) {
    const fv = product.variants[0];
    document.getElementById('panelPrice').textContent = formatPrice(fv.price, fv.price_currency);

    // Poetic first line
    const tmp = document.createElement('div');
    tmp.innerHTML = product.body_html;
    const firstEm = tmp.querySelector('em');
    if (firstEm) document.getElementById('panelDesc').textContent = firstEm.textContent.trim();

    // Details: full HTML minus first poetic paragraph
    if (firstEm && firstEm.closest('p')) firstEm.closest('p').remove();
    document.getElementById('detailsContent').innerHTML = tmp.innerHTML;

    // Size selector
    const needsSize = productDef.variants[0].size !== null;
    if (needsSize) {
      document.getElementById('sizeSection').style.display = 'block';
      const sizeBtns = document.getElementById('sizeBtns');
      productDef.variants.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'size-btn';
        const sv = product.variants.find(x => String(x.id) === String(v.id));
        btn.textContent = v.size;
        if (sv && parseFloat(sv.price) !== parseFloat(fv.price)) {
          btn.textContent += ` (${formatPrice(sv.price, sv.price_currency)})`;
        }
        btn.addEventListener('click', () => {
          document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedVariantId = v.id;
          updateOrderBtn();
        });
        sizeBtns.appendChild(btn);
      });
    } else {
      updateOrderBtn();
    }
  }
}

function closePanel() {
  document.getElementById('backdrop').classList.remove('visible');
  document.getElementById('panel').classList.remove('visible');
  document.body.style.overflow = '';
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
  selectedProduct = null; currentProduct = null; selectedVariantId = null;
}

document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('backdrop').addEventListener('click', closePanel);

// Build grid
const grid = document.getElementById('productGrid');
PRODUCTS.forEach(p => {
  const card = document.createElement('div');
  card.className = 'product-card';
  card.innerHTML = `<div class="product-name">${p.name}</div><div class="product-price product-loading">—</div>`;
  fetchProduct(p.handle).then(product => {
    if (product?.variants[0]) {
      const v = product.variants[0];
      card.querySelector('.product-price').textContent = formatPrice(v.price, v.price_currency);
      card.querySelector('.product-price').classList.remove('product-loading');
    }
  });
  card.addEventListener('click', () => {
    document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    openPanel(p);
  });
  grid.appendChild(card);
});
</script>
